<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Data Import Tool</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
            text-align: center;
        }

        .subtitle {
            color: #666;
            text-align: center;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #444;
            font-weight: 600;
            font-size: 14px;
        }

        input[type="text"],
        input[type="url"] {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus,
        input[type="url"]:focus {
            outline: none;
            border-color: #667eea;
        }

        .file-input-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
            width: 100%;
        }

        .file-input-wrapper input[type="file"] {
            position: absolute;
            left: -9999px;
        }

        .file-input-label {
            display: block;
            padding: 12px 15px;
            background: #f5f5f5;
            border: 2px dashed #d0d0d0;
            border-radius: 8px;
            cursor: pointer;
            text-align: center;
            color: #666;
            transition: all 0.3s;
        }

        .file-input-label:hover {
            background: #ebebeb;
            border-color: #667eea;
        }

        .file-input-label.has-file {
            background: #e7f3ff;
            border-color: #667eea;
            color: #667eea;
        }

        .btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 10px;
        }

        .btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .progress-container {
            display: none;
            margin-top: 20px;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e0e0e0;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 10px;
        }

        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            transition: width 0.3s ease;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .progress-text {
            text-align: center;
            color: #666;
            font-size: 14px;
        }

        .message {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            display: none;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.success {
            background: #d4edda;
            border: 2px solid #c3e6cb;
            color: #155724;
        }

        .message.error {
            background: #f8d7da;
            border: 2px solid #f5c6cb;
            color: #721c24;
        }

        .message-title {
            font-weight: 600;
            font-size: 16px;
            margin-bottom: 5px;
        }

        .message-content {
            font-size: 14px;
            line-height: 1.5;
        }

        .stats {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid rgba(0, 0, 0, 0.1);
        }

        .stats-item {
            display: flex;
            justify-content: space-between;
            margin: 5px 0;
            font-size: 14px;
        }

        .stats-label {
            font-weight: 600;
        }

        .helper-text {
            font-size: 12px;
            color: #888;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📦 Order Data Import Tool</h1>
        <p class="subtitle">Import your Allegro purchases to your Vercel app</p>

        <form id="importForm">
            <div class="form-group">
                <label for="vercelUrl">Vercel App URL</label>
                <input
                    type="url"
                    id="vercelUrl"
                    placeholder="https://my-app.vercel.app"
                    required
                >
                <p class="helper-text">Enter your deployed Vercel app URL (without trailing slash)</p>
            </div>

            <div class="form-group">
                <label for="fileInput">Select JSON File</label>
                <div class="file-input-wrapper">
                    <input
                        type="file"
                        id="fileInput"
                        accept=".json"
                        required
                    >
                    <label for="fileInput" class="file-input-label" id="fileLabel">
                        📁 Click to select allegro_purchases.json
                    </label>
                </div>
                <p class="helper-text">Choose your JSON file containing order data</p>
            </div>

            <button type="submit" class="btn" id="importBtn">
                🚀 Import Orders
            </button>
        </form>

        <div class="progress-container" id="progressContainer">
            <div class="progress-bar">
                <div class="progress-bar-fill" id="progressFill" style="width: 0%"></div>
            </div>
            <p class="progress-text" id="progressText">Uploading...</p>
        </div>

        <div class="message" id="message">
            <div class="message-title" id="messageTitle"></div>
            <div class="message-content" id="messageContent"></div>
        </div>
    </div>

    <script>
        const form = document.getElementById('importForm');
        const fileInput = document.getElementById('fileInput');
        const fileLabel = document.getElementById('fileLabel');
        const importBtn = document.getElementById('importBtn');
        const progressContainer = document.getElementById('progressContainer');
        const progressFill = document.getElementById('progressFill');
        const progressText = document.getElementById('progressText');
        const message = document.getElementById('message');
        const messageTitle = document.getElementById('messageTitle');
        const messageContent = document.getElementById('messageContent');

        // Update file label when file is selected
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                fileLabel.textContent = `✅ ${file.name}`;
                fileLabel.classList.add('has-file');
            } else {
                fileLabel.textContent = '📁 Click to select allegro_purchases.json';
                fileLabel.classList.remove('has-file');
            }
        });

        // Handle form submission
        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const vercelUrl = document.getElementById('vercelUrl').value.trim();
            const file = fileInput.files[0];

            if (!file) {
                showMessage('error', 'No File Selected', 'Please select a JSON file to import.');
                return;
            }

            // Validate URL
            let apiUrl = vercelUrl;
            if (!apiUrl.startsWith('http://') && !apiUrl.startsWith('https://')) {
                apiUrl = 'https://' + apiUrl;
            }
            // Remove trailing slash
            apiUrl = apiUrl.replace(/\/$/, '');

            // Show progress
            importBtn.disabled = true;
            progressContainer.style.display = 'block';
            message.style.display = 'none';
            progressFill.style.width = '30%';
            progressText.textContent = 'Reading file...';

            try {
                // Read file
                const fileContent = await readFileAsText(file);
                const jsonData = JSON.parse(fileContent);

                // Validate JSON structure
                if (!Array.isArray(jsonData)) {
                    throw new Error('Invalid JSON format. Expected an array of orders.');
                }

                progressFill.style.width = '50%';
                progressText.textContent = `Uploading ${jsonData.length} orders...`;

                // Send to API
                const response = await fetch(`${apiUrl}/api/orders/bulk-import`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(jsonData)
                });

                progressFill.style.width = '90%';
                progressText.textContent = 'Processing response...';

                const result = await response.json();

                progressFill.style.width = '100%';

                if (response.ok || response.status === 207) {
                    // Build summary stats
                    const statsHtml = `
                        <div class="stats">
                            <div class="stats-item">
                                <span class="stats-label">Total Orders:</span>
                                <span>${result.totalOrders || jsonData.length}</span>
                            </div>
                            <div class="stats-item">
                                <span class="stats-label">✅ Inserted:</span>
                                <span style="color: #28a745; font-weight: bold;">${result.inserted || 0}</span>
                            </div>
                            <div class="stats-item">
                                <span class="stats-label">🔄 Updated:</span>
                                <span style="color: #007bff; font-weight: bold;">${result.updated || 0}</span>
                            </div>
                            <div class="stats-item">
                                <span class="stats-label">⏭️ Duplicates:</span>
                                <span style="color: #6c757d; font-weight: bold;">${result.duplicates || 0}</span>
                            </div>
                            ${result.failed ? `
                                <div class="stats-item">
                                    <span class="stats-label">❌ Failed:</span>
                                    <span style="color: #dc3545; font-weight: bold;">${result.failed}</span>
                                </div>
                            ` : ''}
                        </div>
                    `;

                    // Build per-order breakdown table
                    let tableHtml = '';
                    if (result.orderResults && result.orderResults.length > 0) {
                        const resultColors = {
                            inserted:  { bg: '#d4edda', text: '#155724', label: '✅ Inserted' },
                            updated:   { bg: '#cce5ff', text: '#004085', label: '🔄 Updated' },
                            duplicate: { bg: '#e2e3e5', text: '#383d41', label: '⏭️ Duplicate' },
                            failed:    { bg: '#f8d7da', text: '#721c24', label: '❌ Failed' }
                        };

                        const rows = result.orderResults.map(r => {
                            const style = resultColors[r.result] || { bg: '#fff', text: '#000', label: r.result };
                            const detail = r.detail || r.error || '';
                            return `<tr>
                                <td style="padding:6px 10px; border-bottom:1px solid #eee; color:#666; font-size:12px;">#${r.index}</td>
                                <td style="padding:6px 10px; border-bottom:1px solid #eee; font-size:12px;">${r.order}</td>
                                <td style="padding:6px 10px; border-bottom:1px solid #eee;">
                                    <span style="background:${style.bg}; color:${style.text}; padding:2px 8px; border-radius:12px; font-size:12px; font-weight:600;">${style.label}</span>
                                </td>
                                <td style="padding:6px 10px; border-bottom:1px solid #eee; font-size:11px; color:#888;">${detail}</td>
                            </tr>`;
                        }).join('');

                        tableHtml = `
                            <details style="margin-top:16px;">
                                <summary style="cursor:pointer; font-weight:600; color:#555; font-size:13px; padding:8px 0;">
                                    📋 View per-order breakdown (${result.orderResults.length} orders)
                                </summary>
                                <div style="overflow-x:auto; margin-top:10px;">
                                    <table style="width:100%; border-collapse:collapse; font-family:inherit;">
                                        <thead>
                                            <tr style="background:#f8f9fa;">
                                                <th style="padding:8px 10px; text-align:left; font-size:12px; color:#666;">#</th>
                                                <th style="padding:8px 10px; text-align:left; font-size:12px; color:#666;">Order</th>
                                                <th style="padding:8px 10px; text-align:left; font-size:12px; color:#666;">Result</th>
                                                <th style="padding:8px 10px; text-align:left; font-size:12px; color:#666;">Detail</th>
                                            </tr>
                                        </thead>
                                        <tbody>${rows}</tbody>
                                    </table>
                                </div>
                            </details>`;
                    }

                    if (result.success) {
                        showMessage('success', '✅ Import Completed!',
                            `All orders processed successfully.${statsHtml}${tableHtml}`);
                    } else {
                        showMessage('success', '⚠️ Import Partially Completed',
                            `${result.message || 'Some orders were imported successfully.'}${statsHtml}${tableHtml}`);
                    }
                } else {
                    throw new Error(result.error || 'Import failed');
                }

            } catch (error) {
                console.error('Import error:', error);
                showMessage('error', '❌ Import Failed',
                    `Error: ${error.message}<br><br>Please check:<br>
                    • Your Vercel URL is correct<br>
                    • The JSON file is valid<br>
                    • Your app is deployed and running<br>
                    • Supabase is configured correctly`);
            } finally {
                importBtn.disabled = false;
                setTimeout(() => {
                    progressContainer.style.display = 'none';
                    progressFill.style.width = '0%';
                }, 1000);
            }
        });

        function readFileAsText(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (e) => resolve(e.target.result);
                reader.onerror = (e) => reject(new Error('Failed to read file'));
                reader.readAsText(file);
            });
        }

        function showMessage(type, title, content) {
            message.className = `message ${type}`;
            messageTitle.textContent = title;
            messageContent.innerHTML = content;
            message.style.display = 'block';
            message.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }
    </script>
</body>
</html>
